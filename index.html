<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Histeer — Coming Soon" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="robots" content="index, follow" />
  <title>Histeer — Worth the wait.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3b82f6;
      --blue-dim: #4a7fd4;
      --bg: #111212;
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.35);
      --text-faint: rgba(255,255,255,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 65%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    /* layout */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* logo */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .logo-star {
      font-size: 24px;
      color: var(--blue);
      line-height: 1;
    }

    .logo-arcs {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .arc {
      width: 26px;
      height: 26px;
      border: 2px solid var(--blue-dim);
      border-radius: 50%;
    }

    .arc-left {
      clip-path: inset(0 50% 0 0);
      transform: scaleX(-1);
    }

    .arc-right {
      clip-path: inset(0 50% 0 0);
    }

    .logo-name {
      font-weight: 500;
      font-size: 22px;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: var(--text);
    }

    /* divider */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(59,130,246,0.5), transparent);
      margin-bottom: 2.5rem;
    }

    /* badge */
    .badge {
      display: inline-block;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 100px;
      padding: 8px 24px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1.5rem;
    }

    /* tagline */
    .tagline {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      margin-bottom: 3rem;
    }

    /* dots */
    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 3rem;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(59,130,246,0.25);
    }

    .dot.active {
      width: 20px;
      height: 5px;
      border-radius: 3px;
      background: var(--blue);
    }

    /* domain */
    .domain {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 3px;
      text-transform: lowercase;
    }

    /* security badge */
    .secure {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 1px;
    }

    .secure-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 480px) {
      .tagline { font-size: 24px; }
      .logo-name { font-size: 18px; letter-spacing: 7px; }
      .secure { bottom: 1rem; right: 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="page">
    <div class="logo">
      <div class="logo-icon">
        <div class="logo-star">★</div>
        <div class="logo-arcs">
          <div class="arc arc-left"></div>
          <div class="arc arc-right"></div>
        </div>
      </div>
      <span class="logo-name">Histeer</span>
    </div>

    <div class="divider"></div>

    <span class="badge">Coming Soon</span>

    <p class="tagline">Worth the wait.</p>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <span class="domain">histeer.com</span>
  </main>

  <div class="secure">
    <div class="secure-dot"></div>
    <span>Secure connection</span>
  </div>
</body>
</html>
